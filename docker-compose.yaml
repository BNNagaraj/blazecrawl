version: "3.8"

services:
  blazecrawl:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped

  # Firebase Emulators for local development
  firebase-emulators:
    build:
      context: .
      dockerfile: Dockerfile.emulators
    ports:
      - "4000:4000"   # Emulator UI
      - "5001:5001"   # Cloud Functions
      - "8080:8080"   # Firestore
      - "9099:9099"   # Auth
    volumes:
      - ./firebase.json:/app/firebase.json
      - ./firestore.rules:/app/firestore.rules
      - ./functions:/app/functions
    environment:
      - FIREBASE_PROJECT_ID=${NEXT_PUBLIC_FIREBASE_PROJECT_ID:-blazecrawl-local}
